<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hypercube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <h1>hypercube</h1>
        <p><strong>Drag:</strong> Rotate XY / YZ planes (3D)</p>
        <p><strong>Shift + Drag:</strong> Rotate XW / YW planes (4D)</p>
        <p><strong>Alt + Drag:</strong> Rotate XZ / ZW planes (4D)</p>
        <div class="shape-selector-container">
            <label for="shape-select">Select Shape:</label>
            <select id="shape-select">
                <option value="pentachoron">Pentachoron (5-Cell)</option>
                <option value="tesseract" selected>Tesseract (8-Cell)</option>
                <option value="orthoplex">Orthoplex (16-Cell)</option>
            </select>
        </div>
    </div>
    <div id="controls">
        <div class="slider-group">
            <input type="range" id="size-slider" min="0.2" max="10.0" step="0.05" value="4.0">
            <label for="size-slider">Scale</label>
        </div>
        <div class="slider-group">
            <input type="range" id="depth-slider" min="1.5" max="5.0" step="0.05" value="2.8">
            <label for="depth-slider">Perspective</label>
        </div>
        <div class="toggles-column">
            <div class="toggle-item">
                <input type="checkbox" id="color-toggle" checked>
                <label for="color-toggle">Color</label>
            </div>
            <div class="toggle-item">
                <input type="checkbox" id="stereo-toggle">
                <label for="stereo-toggle">3D</label>
            </div>
            <div class="toggle-item">
                <input type="checkbox" id="auto-toggle" checked>
                <label for="auto-toggle">Auto</label>
            </div>
        </div>
    </div>
    <canvas id="hypercube"></canvas>
    <script src="script.js?v=9"></script>
</body>
</html>
